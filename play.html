<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prism | Downtown</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { margin: 0; background: #111; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-wrapper { position: relative; width: 800px; height: 494px; border: 4px solid #000; background: #87CEEB; }
        #ui-bar { position: absolute; bottom: 10px; width: 100%; display: flex; justify-content: center; gap: 10px; z-index: 100; }
        .ui-btn { width: 50px; height: 50px; cursor: pointer; border: none; background: transparent; }
        .ui-btn img { width: 100%; height: 100%; }
        #chat-container { width: 300px; background: rgba(0,0,0,0.6); border-radius: 20px; padding: 5px 15px; display: flex; }
        #chat-input { background: transparent; border: none; color: white; width: 100%; outline: none; }
    </style>
</head>
<body>

    <div id="game-wrapper">
        <div id="game-container">
    <div id="game-loader" style="position: absolute; inset: 0; background: #fff5f8; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; transition: opacity 0.8s ease;">
        <img src="assets/ui/loading.gif" style="width: 100px;">
        <p id="load-status" style="font-family: 'Quicksand'; color: #ff8fb1; margin-top: 10px; font-weight: bold;">Connecting to Prism...</p>
    </div>
        <canvas id="gameCanvas" width="800" height="494"></canvas>

        <div id="ui-bar">
            <button class="ui-btn" onclick="toggleInventory()"><img src="assets/ui/fntg-ui-button-inventory.png"></button>
            <div id="chat-container">
                <input type="text" id="chat-input" placeholder="Type to chat..." onkeydown="if(event.key==='Enter') handleChat()">
            </div>
            <button class="ui-btn" onclick="logout()"><img src="assets/ui/fntg-ui-button-settings.png"></button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="./assets.js"></script>
    <script src="./inventory.js"></script>
    <script src="./engine.js"></script>
    <script>
    const firebaseConfig = {
        apiKey: "AIzaSyAXvloQVCgdaqHJSUMW9EjoMR6loLsDKpQ",
        authDomain: "dynamic-40949.firebaseapp.com",
        projectId: "dynamic-40949",
        storageBucket: "dynamic-40949.firebasestorage.app",
        messagingSenderId: "377647789786",
        appId: "1:377647789786:web:0c9b5fbdd0880f36b297e3"
    };

    // 2. THE INITIALIZATION (This fixes the red error!)
    firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Inside play.html
auth.onAuthStateChanged(user => {
    if (user) {
        db.collection("users").doc(user.uid).get().then(doc => {
            if (doc.exists) {
                const userData = doc.data();
                // Send ALL the data to the engine
                initEngine(userData); 
            }
        });
    }
});

        function handleChat() {
            const input = document.getElementById('chat-input');
            sendChat(input.value);
            input.value = "";
        }
        function logout() { auth.signOut(); }
    </script>
</body>
</html>
