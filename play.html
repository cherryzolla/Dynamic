<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Prism</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<<body style="background: #1a1a1a; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh;">

    <div id="game-wrapper" style="position: relative; border: 4px solid #ff8fb1; border-radius: 12px; overflow: hidden; width: 800px; height: 494px; background: #87CEEB;">
        
        <div id="loader" style="position: absolute; inset: 0; background: #fff5f8; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; transition: opacity 0.5s;">
            <img src="assets/ui/loading.gif" style="width: 80px;">
            <p style="font-family: sans-serif; color: #ff8fb1; font-weight: bold;">Entering Prism...</p>
        </div>

        <canvas id="prismCanvas" width="800" height="494"></canvas>
           <div id="inventory-window" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 480px; height: 380px; z-index: 1000;">
    
    <img src="assets/ui/fntg-ui-inventory-bg-1.png" style="position: absolute; width: 100%;">

    <img src="assets/ui/fntg-ui-inventory-bg-2.png" style="position: absolute; top: 50px; left: 25px; width: 430px;">

    <img src="assets/ui/fntg-ui-inventory-character-preview-bg.png" style="position: absolute; top: 75px; left: 45px; width: 130px;">

    <img src="assets/ui/fntg-ui-x-button.png" onclick="toggleInventory()" style="position: absolute; top: 15px; right: 15px; width: 25px; cursor: pointer;">

    <div id="inv-tabs" style="position: absolute; top: 60px; right: 40px; display: flex; flex-direction: column; gap: 5px;">
        <img src="assets/ui/fntg-ui-inventory-buttons-hair.png" class="tab" onclick="filterInv('hair')" style="cursor:pointer; width: 40px;">
        <img src="assets/ui/fntg-ui-inventory-buttons-clothes.png" class="tab" onclick="filterInv('tops')" style="cursor:pointer; width: 40px;">
        <img src="assets/ui/fntg-ui-inventory-buttons-board.png" class="tab" onclick="filterInv('board')" style="cursor:pointer; width: 40px;">
    </div>

    <div id="item-grid" style="position: absolute; top: 85px; left: 190px; width: 230px; height: 200px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; overflow-y: auto;">
        </div>
</div>
        <div class="ui-bar" style="position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 15px; pointer-events: none;">
            
            
            <img src="assets/ui/fntg-ui-button-world-map.png" id="map-btn" style="width: 45px; cursor: pointer; pointer-events: auto;">
            <img src="assets/ui/fntg-ui-button-inventory.png" id="inv-btn" style="width: 45px; cursor: pointer; pointer-events: auto;">

            <div id="chat-wrapper" style="pointer-events: auto;">
                <input type="text" id="chat-input" placeholder="Type to chat..." maxlength="50" 
                    style="width: 250px; padding: 10px 15px; border-radius: 20px; border: 2px solid #ff8fb1; outline: none; font-family: 'Quicksand', sans-serif; background: rgba(255, 255, 255, 0.9); box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
            </div>

            <img src="assets/ui/fntg-ui-button-settings.png" id="set-btn" style="width: 45px; cursor: pointer; pointer-events: auto;">
            
        </div>
    </div>

    <script src="core.js"></script>
</body>
