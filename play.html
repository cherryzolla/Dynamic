<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Prism</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<<body style="background: #1a1a1a; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh;">

    <div id="game-wrapper" style="position: relative; border: 4px solid #ff8fb1; border-radius: 12px; overflow: hidden; width: 800px; height: 494px; background: #87CEEB;">
        
        <div id="loader" style="position: absolute; inset: 0; background: #fff5f8; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; transition: opacity 0.5s;">
            <img src="assets/ui/loading.gif" style="width: 80px;">
            <p style="font-family: sans-serif; color: #ff8fb1; font-weight: bold;">Entering Prism...</p>
        </div>

        <canvas id="prismCanvas" width="800" height="494"></canvas>
        <div id="inventory-window" style="display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 800px; height: 500px; z-index: 1000; font-family: 'Arial', sans-serif;">
    
    <img src="assets/ui/fntg-ui-inventory-bg-1.png" style="position: absolute; width: 100%; height: 100%; border-radius: 15px;">
    
    <div style="position: absolute; top: 80px; left: 20px; right: 20px; bottom: 20px; background-color: #B5E2FF; border-radius: 10px; border: 2px solid #79B8E0;">
        
        <div id="inv-tabs" style="position: absolute; top: -42px; left: 10px; display: flex; gap: 2px;">
            <img src="assets/ui/fntg-ui-inventory-buttons-hair.png" onclick="filterInv('hair')" style="cursor:pointer; height: 40px;">
            <img src="assets/ui/fntg-ui-inventory-buttons-clothes.png" onclick="filterInv('tops')" style="cursor:pointer; height: 40px;">
            <img src="assets/ui/fntg-ui-inventory-buttons-board.png" onclick="filterInv('board')" style="cursor:pointer; height: 40px;">
            <img src="assets/ui/fntg-ui-inventory-buttons-accessory.png" onclick="filterInv('faceAcc')" style="cursor:pointer; height: 40px;">
            <img src="assets/ui/fntg-ui-inventory-buttons-favorite.png" style="cursor:pointer; height: 40px;">
            <img src="assets/ui/fntg-ui-inventory-buttons-creature.png" style="cursor:pointer; height: 40px;">
        </div>

        <div style="position: absolute; top: 20px; left: 20px; width: 500px; height: 360px; background: white; border: 2px solid #79B8E0; border-radius: 10px;">
            <div id="item-grid" style="padding: 15px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; overflow-y: auto; height: 100%;">
                </div>
        </div>

        <div style="position: absolute; top: 20px; right: 20px; width: 220px; height: 360px;">
            <img src="assets/ui/fntg-ui-inventory-character-preview-bg.png" style="width: 100%; height: 100%;">
            <canvas id="previewCanvas" width="200" height="300" style="position: absolute; top: 30px; left: 10px;"></canvas>
            
            <button style="position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); background: linear-gradient(#D38DFF, #9B4DFF); color: white; border: 2px solid white; border-radius: 15px; padding: 5px 15px; cursor: pointer; font-weight: bold;">Dye Your Hair!</button>
        </div>
    </div>

    <img src="assets/ui/fntg-ui-x-button.png" onclick="toggleInventory()" style="position: absolute; top: 15px; right: 15px; width: 35px; cursor: pointer;">
</div>
        <div class="ui-bar" style="position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 15px; pointer-events: none;">
            
            
            <img src="assets/ui/fntg-ui-button-world-map.png" id="map-btn" style="width: 45px; cursor: pointer; pointer-events: auto;">
            <img src="assets/ui/fntg-ui-button-inventory.png" id="inv-btn" style="width: 45px; cursor: pointer; pointer-events: auto;">

            <div id="chat-wrapper" style="pointer-events: auto;">
                <input type="text" id="chat-input" placeholder="Type to chat..." maxlength="50" 
                    style="width: 250px; padding: 10px 15px; border-radius: 20px; border: 2px solid #ff8fb1; outline: none; font-family: 'Quicksand', sans-serif; background: rgba(255, 255, 255, 0.9); box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
            </div>

            <img src="assets/ui/fntg-ui-button-settings.png" id="set-btn" style="width: 45px; cursor: pointer; pointer-events: auto;">
            
        </div>
    </div>

    <script src="core.js"></script>
</body>
