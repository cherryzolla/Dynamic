<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Prism</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body style="background: #1a1a1a; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh;">

    <div id="game-wrapper" style="position: relative; border: 4px solid #ff8fb1; border-radius: 12px; overflow: hidden; width: 800px; height: 494px; background: #87CEEB;">
        
        <div id="loader" style="position: absolute; inset: 0; background: #fff5f8; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; transition: opacity 0.5s;">
            <img src="assets/ui/loading.gif" style="width: 80px;">
            <p style="font-family: sans-serif; color: #ff8fb1; font-weight: bold;">Entering Prism...</p>
        </div>

        <canvas id="prismCanvas" width="800" height="494"></canvas>

        <div id="inventory-wrapper"></div>
        <div id="id-fone-wrapper"></div>

        <div class="ui-bar" style="position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: center; align-items: center; gap: 15px; pointer-events: none; z-index: 50;">
            
            <img src="assets/ui/fntg-ui-button-world-map.png" id="map-btn" style="width: 45px; cursor: pointer; pointer-events: auto;">
            <img src="assets/ui/fntg-ui-button-inventory.png" id="inv-btn" style="width: 45px; cursor: pointer; pointer-events: auto;" onclick="toggleInventory()">

            <div id="chat-wrapper" style="pointer-events: auto;">
                <input type="text" id="chat-input" placeholder="Type to chat..." maxlength="50" 
                    style="width: 250px; padding: 10px 15px; border-radius: 20px; border: 2px solid #ff8fb1; outline: none; font-family: 'Quicksand', sans-serif; background: rgba(255, 255, 255, 0.9); box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
            </div>

            <img src="assets/ui/fntg-ui-button-settings.png" id="set-btn" style="width: 45px; cursor: pointer; pointer-events: auto;">
            
        </div>
    </div>

    <script>
            document.getElementById('set-btn').onclick = () => {
    // Show your logout option
    if(confirm("Logout of Prism?")) {
        firebase.auth().signOut().then(() => {
            // Once signed out, redirect to your login page
            window.location.href = "index.html";
        }).catch((error) => {
            console.error("Logout failed:", error);
        });
    }
    };
        // Helper function to load external HTML
        async function loadComponent(file, wrapperId) {
            try {
                const response = await fetch(file);
                if (!response.ok) throw new Error(`Could not find ${file}`);
                const html = await response.text();
                
                const wrapper = document.getElementById(wrapperId);
                wrapper.innerHTML = html;
                
                // Hide the content inside the wrapper after loading
                if (wrapper.firstElementChild) {
                    wrapper.firstElementChild.style.display = 'none';
                }
                console.log(`Loaded: ${file}`);
            } catch (err) {
                console.warn("UI Load Error:", err);
            }
        }

        // Wait for the HTML structure to be ready
        document.addEventListener('DOMContentLoaded', async () => {
            // Load the HTML parts first
            await loadComponent('idfone.html', 'id-fone-wrapper');
            await loadComponent('inventory.html', 'inventory-wrapper');

            console.log("HTML Components ready. Starting game scripts...");

            // Load core.js AFTER the canvas and HTML are ready
            const coreScript = document.createElement('script');
            coreScript.src = "core.js";
            document.body.appendChild(coreScript);

            // Load idfone.js
            const foneScript = document.createElement('script');
            foneScript.src = "idfone.js";
            document.body.appendChild(foneScript);
        });
    </script>
    <script src="js/core.js"></script>
    <script src="js/idfone.js">
        
    </script>
    <script src="js/inventory.js"></script>
    
</body>
</html>
