<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Prism</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>
<body style="background: #1a1a1a; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh;">

    <div id="game-wrapper" style="position: relative; border: 4px solid #ff8fb1; border-radius: 12px; overflow: hidden; width: 800px; height: 494px; background: #87CEEB;">
        
        <div id="loader" style="position: absolute; inset: 0; background: #fff5f8; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; transition: opacity 0.5s;">
            <img src="assets/ui/loading.gif" style="width: 80px;">
            <p style="font-family: sans-serif; color: #ff8fb1; font-weight: bold;">Entering Prism...</p>
        </div>
        <canvas id="prismCanvas" width="800" height="494"></canvas>

        <div class="ui-bar" style="position: absolute; bottom: 15px; width: 100%; display: flex; justify-content: center; gap: 20px; pointer-events: none;">
    <img src="assets/ui/fntg-ui-button-inventory.png" id="inv-btn" style="width: 45px; cursor: pointer; pointer-events: auto;">
    <div id="chat-container" style="position: absolute; bottom: 70px; width: 100%; display: flex; justify-content: center; z-index: 20; pointer-events: none;">
    <input type="text" id="chat-input" placeholder="Type to chat..." maxlength="50" 
        style="pointer-events: auto; width: 300px; padding: 8px; border-radius: 20px; border: 2px solid #ff8fb1; outline: none; font-family: 'Quicksand', sans-serif; background: rgba(255, 255, 255, 0.9);">
</div>
    <img src="assets/ui/fntg-ui-button-world-map.png" id="map-btn" style="width: 45px; cursor: pointer; pointer-events: auto;">
    <img src="assets/ui/fntg-ui-button-settings.png" id="set-btn" style="width: 45px; cursor: pointer; pointer-events: auto;">
</div>
    </div>

    <script src="core.js"></script>
</body>
</html>
