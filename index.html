<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Dynamic Prism 🌸</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <div id="auth-page" class="auth-page">
        <div class="auth-box">
            
            <div id="auth-fields">
                <h1 id="auth-title" style="color: #ff8fb1">🌸 Login</h1>
                
                <div id="name-field" style="display:none;">
                    <input type="text" id="userName" placeholder="Your Name">
                    <input type="text" id="inviteCode" placeholder="Special Lil Invite Code 🔑">
                </div>

                <input type="email" id="email" placeholder="Email">
                <input type="password" id="pass" placeholder="Password">
                
                <div id="login-actions" style="margin-top:10px;">
                    <button onclick="login()" class="bubbly-btn">Login</button>
                    <p class="toggle-text" onclick="toggleAuth('register')">
                        New here? Join the club! ✨
                    </p>
                </div>

                <div id="register-actions" style="display:none; margin-top:10px;">
                    <button onclick="register()" class="bubbly-btn" style="background: #e0f2f1; color: #4db6ac;">Create Account</button>
                    <p class="toggle-text" onclick="toggleAuth('login')">
                        Already have an account? Login! 🌸
                    </p>
                </div>
            </div>

            <div id="char-setup" style="display:none; text-align: center; animation: fadeIn 0.5s;">
                <h1 style="color: #ff8fb1; font-family: 'Quicksand';">Choose Your Look 🌸</h1>
                <p style="color: #888; margin-bottom: 30px; font-size: 13px;">This will be your base avatar!</p>

                <div style="display: flex; justify-content: center; gap: 40px; margin-bottom: 40px;">
                    <div class="char-option" onclick="selectGender('F')" id="option-f">
                        <div class="char-preview-bg">
                            <img src="assets/items/girl/body/fantage-girl-outline.png" alt="Girl Base">
                        </div>
                        <h3 style="margin-center: 15px;">GIRL</h3>
                    </div>

                    <div class="char-option" onclick="selectGender('M')" id="option-m">
                        <div class="char-preview-bg">
                            <img src="assets/items/boy/body/fantage-boy-outline.png" alt="Boy Base">
                        </div>
                        <h3 style="margin-center: 15px;">BOY</h3>
                    </div>
                </div>
                <button onclick="confirmCharacter()" id="enter-btn" class="bubbly-btn" style="width: 250px; display: none;">
                    Confirm & Enter Prism ✨
                </button>
            </div>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
  // Wait until the page is fully loaded to be safe
  window.onload = () => {
    const supabaseUrl = 'https://your-api-url.supabase.co'
    const supabaseKey = 'your-anon-key'
    
    // Use window.supabase to make sure it finds the library
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)
    
    console.log("Did it work?", supabase)
  };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <script src="./auth.js"></script>
    <script src="./assets.js"></script> </body>
</html>
