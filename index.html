<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Life Planner 🌸</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <div id="auth-page" class="auth-page">
        <div class="auth-box">
            <h1 style="color: #ff8fb1">🌸 Welcome</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <div style="margin-top:10px;">
                <button onclick="login()" class="bubbly-btn">Login</button>
                <button onclick="register()" class="bubbly-btn" style="background: #e0f2f1; color: #4db6ac;">Join</button>
            </div>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <div class="nav">
            <button onclick="show('home')">🏠</button>
            <button onclick="show('dump')">🌪️</button>
            <button onclick="logout()">👋</button>
        </div>
        <div id="home" class="page active">
            <div class="card">
                <h3>✅ To-Do List</h3>
                <input type="text" id="todoIn" placeholder="New task..." style="width:70%">
                <button onclick="addTodo()" class="bubbly-btn">Add</button>
                <div id="todo-list" style="margin-top:15px;"></div>
            </div>
        </div>
        <div id="dump" class="page">
            <div class="card">
                <h3>🌪️ THE DUMP</h3>
                <textarea id="dumpIn"></textarea>
                <button onclick="addDump()" class="bubbly-btn">Dump It!</button>
                <div id="dump-list"></div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
