<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Life Planner 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>

    <style>
        :root {
            --bg-color: #fffaf0;
            --header-pink: #ffdae9;
            --accent-pink: #ff8fb1;
            --mint: #e0f2f1;
            --text-grey: #5d5d5d;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-grey);
            margin: 0; padding: 0;
        }

        /* --- AUTH SCREEN --- */
        .auth-container { height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, #fff5f8 0%, #e0f2f1 100%); }
        .auth-box { background: white; padding: 30px; border-radius: 30px; border: 3px solid var(--header-pink); text-align: center; width: 300px; }
        input { width: 80%; padding: 10px; margin: 10px 0; border-radius: 15px; border: 1px solid #ddd; font-family: 'Quicksand'; }

        /* --- DASHBOARD GRID --- */
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; padding: 15px; }
        .widget { background: white; border-radius: 20px; padding: 15px; border: 2px solid var(--header-pink); box-shadow: 4px 4px 0px #ffeff5; text-align: center; }
        .pie-chart { width: 60px; height: 60px; border-radius: 50%; margin: 10px auto; background: conic-gradient(var(--accent-pink) 0%, #f0f0f0 0); }

        /* --- NAVIGATION --- */
        .nav-bar { display: flex; justify-content: space-around; background: white; padding: 15px; border-bottom: 2px solid var(--header-pink); }
        .page { display: none; padding: 20px; }
        .active { display: block; }
        
        .bubbly-btn { background: var(--header-pink); border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; color: var(--accent-pink); }
        .dump-note { background: #fff7cc; padding: 15px; border-radius: 15px; margin-bottom: 10px; break-inside: avoid; border: 1px solid #eee; }
    </style>
</head>
<body>

    <div id="auth-page" class="auth-container">
        <div class="auth-box">
            <h1>🌸 Login</h1>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="pass" placeholder="Password">
            <button onclick="login()" class="bubbly-btn">Enter ✨</button>
        </div>
    </div>

    <div id="main-app" style="display:none;">
        <div class="nav-bar">
            <button onclick="show('home')">🏠</button>
            <button onclick="show('savings')">💰</button>
            <button onclick="show('school')">🎓</button>
            <button onclick="show('dump')">🌪️</button>
            <button onclick="logout()">Bye!</button>
        </div>

        <div id="home" class="page active">
            <div class="dashboard-grid">
                <div class="widget">
                    <h3>Goal</h3>
                    <div id="pie" class="pie-chart"></div>
                    <p id="goal-text">0%</p>
                </div>
                <div class="widget">
                    <h3>GPA</h3>
                    <h2 id="gpa-val">4.0</h2>
                </div>
            </div>
        </div>

        <div id="dump" class="page">
            <h2>🌪️ THE DUMP</h2>
            <textarea id="dumpInput" style="width:100%; height:80px; border-radius:15px; padding:10px;"></textarea>
            <button onclick="addDump()" class="bubbly-btn">Dump It! ✨</button>
            <div id="dump-list" style="margin-top:20px;"></div>
        </div>
        
        </div>

    <script>
        // --- CONFIG ---
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
  
          const firebaseConfig = {
            apiKey: "AIzaSyAXvloQVCgdaqHJSUMW9EjoMR6loLsDKpQ",
            authDomain: "dynamic-40949.firebaseapp.com",
            projectId: "dynamic-40949",
            storageBucket: "dynamic-40949.firebasestorage.app",
            messagingSenderId: "377647789786",
            appId: "1:377647789786:web:0c9b5fbdd0880f36b297e3",
            measurementId: "G-9KWEJYE88T"
        };
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);

        let myDump = [];

        function login() {
            // Simplification: Auto-enter for now!
            document.getElementById('auth-page').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ffb6c1', '#e0f2f1'] });
        }

        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function addDump() {
            let val = document.getElementById('dumpInput').value;
            if(!val) return;
            myDump.unshift(val);
            renderDump();
            document.getElementById('dumpInput').value = "";
        }

        function renderDump() {
            let html = "";
            myDump.forEach((note, i) => {
                html += `<div class="dump-note">${note} <br><button onclick="promote(${i})">✅</button></div>`;
            });
            document.getElementById('dump-list').innerHTML = html;
        }

        function promote(i) {
            confetti({ particleCount: 50, scalar: 0.7 });
            myDump.splice(i, 1);
            renderDump();
        }
    </script>
</body>
</html>
