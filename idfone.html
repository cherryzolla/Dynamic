<div id="idfone-overlay" class="idfone-container">
    <img src="assets/ui/fntg-ui-x-button.png" 
         onclick="document.getElementById('idfone-overlay').style.display='none'" 
         style="position: absolute; top: 10px; right: 10px; width: 25px; cursor: pointer; z-index: 100;">

    <div class="idfone-stats-row">
        <div class="idfone-stat-item"><b>S:</b> <span id="idfone-stars">0</span></div>
        <div class="idfone-stat-item"><b>e:</b> <span id="idfone-ecoins">0</span></div>
        <div class="idfone-stat-item"><b>G:</b> <span id="idfone-gold">0</span></div>
    </div>

    <div class="idfone-content">
        <div class="idfone-column">
            <div id="idfone-username" class="idfone-name-text">Username</div>
            <div class="idfone-rank-text">MAJOR LEAGUER</div>
            <div class="idfone-level-text">Level: <span id="idfone-level">0</span></div>
            <button class="idfone-blue-btn">Plate Inventory</button>
            
            <div class="idfone-avatar-preview">
            </div>
        </div>

        <div class="idfone-column">
            <div class="idfone-profile-row">
                <span class="idfone-label">Mood:</span>
                <span id="idfone-mood" class="idfone-value">Jealous</span>
                <span class="idfone-icon-letter">(M)</span>
            </div>
            <div class="idfone-profile-row">
                <span class="idfone-label">Color:</span>
                <span id="idfone-color" class="idfone-value">Black</span>
                <span class="idfone-icon-letter">(C)</span>
            </div>
            <div class="idfone-profile-row">
                <span class="idfone-label">Game:</span>
                <span id="idfone-game" class="idfone-value">Fashion Show</span>
            </div>
            <button class="idfone-blue-btn">Edit Profile</button>
            <div class="idfone-friends-count">6 Friends Invited</div>
        </div>
    </div>

    <div class="idfone-app-bar">
        <div class="idfone-app-unit"><b>A</b><br>Apps</div>
        <div class="idfone-app-unit"><b>C</b><br>Custom</div>
        <div class="idfone-app-unit"><b>M</b><br>Medals</div>
        <div class="idfone-app-unit"><b>S</b><br>Stickers</div>
        <div class="idfone-app-unit"><b>e</b><br>eCoins</div>
        <div class="idfone-app-unit"><b>I</b><br>Invite</div>
        <div class="idfone-app-unit"><b>F</b><br>Farm</div>
    </div>
</div>
